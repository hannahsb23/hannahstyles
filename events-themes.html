<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hannah Styles | Events &amp; Themes</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div id="mySidenav" class="sidenav">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <a href="index.html">Home</a>
        <a href="events-themes.html">Events &amp; Themes</a>
        <a href="pricing.html">Pricing</a>
    </div>

    <header>
        <span class="open-btn" onclick="openNav()">&#9776;</span>
        <nav>
            <a href="index.html">Home</a>
            <a href="events-themes.html">Events &amp; Themes</a>
            <a href="pricing.html">Pricing</a>
        </nav>
    </header>

    <main class="events-page">
        <section class="page-title-box">
            <h1>Events &amp; Themes</h1>
        </section>

        <section class="theme-row">
            <div class="theme-images">
                <img src="images/birthday1.jpg" alt="Birthday party setup">
                <img src="images/birthday2.jpg" alt="Birthday party decorations">
            </div>
            <div class="theme-label">Birthday Parties</div>
        </section>

        <section class="theme-row">
            <div class="theme-images">
                <img src="images/wedding1.jpg" alt="Wedding or formal event setup">
                <img src="images/wedding2.jpg" alt="Formal event decorations">
            </div>
            <div class="theme-label">Weddings / Formal Events</div>
        </section>

        <section class="theme-row">
            <div class="theme-images">
                <img src="images/holiday1.jpg" alt="Seasonal event setup">
                <img src="images/holiday2.jpg" alt="Holiday decorations">
            </div>
            <div class="theme-label">Seasonal / Holiday Events</div>
        </section>

        <section class="bottom-message">
            <h2>Choose a theme that fits your vision!</h2>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>Hannah Styles | 2026</p>
            <div class="socials">
                <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
                <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
                <a href="#"><img src="images/twitter.png" alt="Twitter"></a>
            </div>
        </div>
    </footer>

    <script>
        function openNav() {
            document.getElementById("mySidenav").style.width = "250px";
        }

        function closeNav() {
            document.getElementById("mySidenav").style.width = "0";
        }
    </script>
</body>
</html>
